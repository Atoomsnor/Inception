services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    networks:
      - inception
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
    restart: unless-stopped

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    env_file:
      - .env
    networks:
      - inception
    # ports:
    #   - "9000:9000"
    volumes:
      - wordpress:/var/www/html
    restart: unless-stopped

  nginx:
    build:
      context: ./
      dockerfile: ./requirements/nginx/dockerfile
    container_name: nginx
    depends_on:
      - wordpress
    env_file:
      - .env
    networks:
      - inception
    # non local
    # ports:
    #   - "443:443"
    ports:
      - "8443:443"
    volumes:
      - wordpress:/var/www/html
    restart: unless-stopped

volumes:
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/roversch/data/wordpress
  mysql:
    name: mysql
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/roversch/data/mysql

networks:
  inception:
    driver: bridge